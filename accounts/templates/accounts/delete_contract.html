{%  extends 'accounts/my_main.html' %}
{% load static %}
{% block content %}

<br>
<div class="row">
	<div class="col-md-6">
		<div class="card card-body">

			<p>Sigur doriți să ștergeți contractul #{{item.id}}?</p>

			<form action="{% url 'delete_contract' item.id  %}" method="POST">

				{% csrf_token %}
				<a class="btn btn-warning" href="{% url 'client' item.client.id %}">Anulare</a>

				<input class="btn btn-danger" type="submit" name="Confirmă">
			</form>
		</div>
	</div>
</div>

{% endblock %}
