<h3>Email de resetare trimis</h3>


<p>V-am trimis instrucțiuni pentru setarea parolei, dacă există un cont cu adresa de email introdusă. Ar trebui să le primiți în scurt timp.</p>

<p>Dacă nu primiți un email, asigurați-vă că ați introdus adresa cu care v-ați înregistrat și verificați folderul Spam.</p>
