{%  extends 'accounts/my_main.html' %}

{% block content %}

<br>

<div class="row">
	<div class="col-md">
		<h5>Clients:</h5>
		<hr>
		<div class="row">
			<div class="col">
				<div class="card card-body">

					<form method="get">
						{{myFilter.form}}

				    <button class="btn btn-primary" type="submit">Search</button>
				  </form>

				</div>
			</div>
		</div>


		<br>

		<div class="card card-body">
			<a class="btn btn-primary btn-sm" href="new_client">New Client</a>
			<table class="table table-sm">
				<tr>
					<th>Client Code</th>
					<th>First Name</th>
					<th>Last Name</th>
					<th>Location</th>
					<th></th>
					<th></th>
				</tr>

				{% for client in clients %}
					<tr>
						<td>{{client.id}}</td>
						<td>{{client.first_name}}</td>
						<td>{{client.last_name}}</td>
						<td>{{client.location}}</td>
						<td><a class="btn btn-sm btn-info" href="{% url 'client' client.id %}">View</a></td>
						<td><a class="btn btn-sm btn-danger" href="{% url 'delete_client' client.id %}">Delete</a></td>
					</tr>
				{% endfor %}

			</table>
		</div>
	</div>
</div>

{% endblock %}
