{%  extends 'accounts/my_main.html' %}
{% load static %}
{% block content %}

<div class="row">
	<div class="col-md-6">
		<div class="card card-body">

			<form action="" method="POST">
				{% csrf_token %}
				{{ form.management_form }}
				{% for field in form %}
				<div class="row">
					<div class="col text-left">{{field.label}} : </div>
					<div class="col">{{field}}</div>
					<hr>
					</div>
				{% endfor %}
				<br>
				<div class="row">
				<div class="col"></div>
				<div class="col"><input type="submit" name="Submit"></div>
				</div>

			</form>

		</div>
	</div>
</div>

{% endblock %}
