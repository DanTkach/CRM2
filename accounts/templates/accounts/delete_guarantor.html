{%  extends 'accounts/my_main.html' %}
{% load static %}
{% block content %}

<br>
<div class="row">
	<div class="col-md-6">
		<div class="card card-body">

			<p>Sigur doriți să ștergeți fidejusorul <b>{{item.last_name}} {{item.first_name}}</b>?</p>

			<form action="{% url 'delete_guarantor' item.id  %}" method="POST">

				{% csrf_token %}
				<a class="btn btn-warning" href="{% url 'update_contract' item.contract.id %}">Anulare</a>

				<input class="btn btn-danger" type="submit" name="Confirmă">
			</form>
		</div>
	</div>
</div>

{% endblock %}
